name: CI - Backend

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ fix/*, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run flake8
        run: |
          pip install flake8
          flake8 backend || true
      - name: Run tests
        run: |
          echo "No tests yet - add tests in backend/tests"
