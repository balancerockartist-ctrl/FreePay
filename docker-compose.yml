version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: freepay-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: freepay

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freepay-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: freepay
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE_MINUTES: "1440"
      CORS_ORIGINS: "http://localhost:3000"
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      CRYPTO_RPC_URL: ""
      ETHERSCAN_API_KEY: ""
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freepay-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001

volumes:
  mongo_data:
