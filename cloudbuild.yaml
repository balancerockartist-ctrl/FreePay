steps:
  # Build and push backend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/freepay-backend:$COMMIT_SHA
      - ./backend

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/$PROJECT_ID/freepay-backend:$COMMIT_SHA

  # Build and push frontend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/freepay-frontend:$COMMIT_SHA
      - ./frontend

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/$PROJECT_ID/freepay-frontend:$COMMIT_SHA

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - freepay-backend
      - --image=gcr.io/$PROJECT_ID/freepay-backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

  # Deploy frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - freepay-frontend
      - --image=gcr.io/$PROJECT_ID/freepay-frontend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

substitutions:
  _REGION: us-central1

images:
  - gcr.io/$PROJECT_ID/freepay-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/freepay-frontend:$COMMIT_SHA
