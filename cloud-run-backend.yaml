apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: freepay-backend
  # Replace PROJECT_ID with your Google Cloud project ID before applying
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/freepay-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: freepay-secrets
                  key: MONGO_URL
            - name: DB_NAME
              value: freepay
            - name: CORS_ORIGINS
              value: "*"
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
